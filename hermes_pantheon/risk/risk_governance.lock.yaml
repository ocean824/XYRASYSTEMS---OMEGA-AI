# =============================================================================
# TIAMAT AI — Sovereign Risk Governance Lock File
# =============================================================================
# This file is the IMMUTABLE source of truth for all risk parameters across the
# LEVIATHAN AI / Hermes Pantheon stack. After customizing the values below,
# set the file immutable at the OS level and record its master SHA-256 hash:
#
#   chmod 444 risk_governance.lock.yaml
#   sudo chattr +i risk_governance.lock.yaml          # Linux
#   sha256sum risk_governance.lock.yaml > risk_master.hash
#
# On macOS:   chflags uchg risk_governance.lock.yaml
# On Windows: icacls risk_governance.lock.yaml /deny "*S-1-1-0:(W)"
#
# TIAMAT AI verifies the SHA-256 hash of this file against risk_master.hash
# BEFORE every order is routed by MEGALODON AI. If the hash does not match,
# all trading is hard-halted until the operator restores the master state.
#
# The TRITON / Hermes self-evolving core has READ-ONLY access to this file
# and has ZERO programmatic permission to modify it.
# =============================================================================

version: 1
schema: leviathan.tiamat.risk.v1
operator_handle: "Operator"          # Customize
account_currency: "USD"

# ---------------------------------------------------------------------------
# 1. Drawdown caps — sovereign, override everything else
# ---------------------------------------------------------------------------
drawdown:
  max_daily_pct: 3.0                  # % of total equity
  max_weekly_pct: 6.0
  max_trailing_pct: 8.0
  daily_reset_time_utc: "00:00"
  on_breach: "global_halt_until_reset" # global_halt_until_reset | reduce_50 | signal_only

# ---------------------------------------------------------------------------
# 2. Portfolio heat — total open risk across all positions
# ---------------------------------------------------------------------------
heat:
  max_open_pct: 5.0                   # % portfolio risk across all open positions
  max_per_position_pct: 1.0           # max % risk on a single position

# ---------------------------------------------------------------------------
# 3. Leverage caps
# ---------------------------------------------------------------------------
leverage:
  max_gross_notional_x: 5             # 5x gross notional cap
  max_net_x: 3                        # 3x net directional exposure
  fx_max_x: 10                        # FX-specific override

# ---------------------------------------------------------------------------
# 4. Correlated exposure
# ---------------------------------------------------------------------------
correlation:
  max_positions_same_sector: 2
  correlation_threshold: 0.7          # absolute Pearson over 30d returns
  on_breach: "block_new_entries"

# ---------------------------------------------------------------------------
# 5. News embargo (AEGIR-flagged events)
# ---------------------------------------------------------------------------
news_embargo:
  tier_1_events:
    - CPI
    - FOMC
    - NFP
    - PCE
    - JoltsJobs
    - GDP
  pre_event_minutes: 30
  post_event_minutes: 30
  on_breach: "block_new_entries"      # existing positions still managed by ORCA

# ---------------------------------------------------------------------------
# 6. Loss-streak throttle / Recovery Mode
# ---------------------------------------------------------------------------
loss_streak:
  consecutive_losers: 3
  size_cut_pct: 50                    # cut new entry size by this %
  duration_hours: 24
  recovery_mode: true                 # auto-engage Recovery Mode

# ---------------------------------------------------------------------------
# 7. Per-instrument hard limits
# ---------------------------------------------------------------------------
instrument_limits:
  default:
    max_position_units: 10
    max_open_positions_per_symbol: 1
  overrides:
    ES:    { max_position_units: 5,  max_open_positions_per_symbol: 1 }
    NQ:    { max_position_units: 3,  max_open_positions_per_symbol: 1 }
    BTCUSD:{ max_position_units: 1,  max_open_positions_per_symbol: 1 }
    SPY:   { max_position_units: 50, max_open_positions_per_symbol: 1 }

# ---------------------------------------------------------------------------
# 8. Kill switches (operator-controlled, hard-coded triggers)
# ---------------------------------------------------------------------------
kill_switches:
  global_halt_file: "hermes_pantheon/risk/HALT.flag"
  on_unexpected_pnl_swing_pct: 2.0    # if P&L moves >2% in <60s, halt
  on_consecutive_broker_errors: 3
  on_omega_kill_signal: true          # honor ØMEGA cross-system kill

# ---------------------------------------------------------------------------
# 9. Audit / verification
# ---------------------------------------------------------------------------
audit:
  master_hash_file: "hermes_pantheon/risk/risk_master.hash"
  guardian_daemon_path: "hermes_pantheon/risk/risk_guardian.py"
  log_path: "hermes_pantheon/risk/risk_audit.jsonl"
  verify_before_every_order: true
  verify_interval_seconds: 60         # also verify on a heartbeat

# ---------------------------------------------------------------------------
# 10. Self-evolution boundary
# ---------------------------------------------------------------------------
self_evolution:
  triton_can_propose_changes: true
  triton_can_apply_changes: false     # ALWAYS false — apply requires operator
  proposal_log: "hermes_pantheon/risk/proposals.jsonl"
